name: Publish to npm
on:
  push:
    tags: ['v*']
permissions:
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # NOTE: After publishing, the monorepo's refresh-trusted-deps.yml
      # (runs every 6h + manual dispatch) detects the new version and
      # invalidates MCP server Docker images. Admin tokens are kept
      # exclusively in the private monorepo, never in this public repo.
