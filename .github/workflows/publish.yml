name: Publish to npm
on:
  push:
    tags: ['v*']
permissions:
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # After publishing, invalidate all MCP server Docker images so they
      # pick up the new rickydata version on next cold start.
      - name: Invalidate MCP Gateway server images
        if: success()
        run: |
          echo "Invalidating all MCP server Docker images..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MCP_GATEWAY_ADMIN_TOKEN }}" \
            https://mcp.rickydata.org/api/admin/invalidate-all-images \
            || echo "Warning: Gateway invalidation failed (non-blocking)"
