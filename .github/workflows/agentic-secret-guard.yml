name: Agentic Secret Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan changed lines for literal secrets
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          HEAD_SHA="${{ github.sha }}"
          echo "Scanning range: $BASE_SHA..$HEAD_SHA"
          python3 scripts/secret-guard.py --range "$BASE_SHA..$HEAD_SHA"

